# Docker-Claw Multi-Agent Docker Compose
# 编排刚子-任务、刚子-监控（宿主机）、煎饼（容器）、墨汁儿（容器）

version: '3.8'

services:
  # 刚子-任务 - 任务发布者
  gangzi-task:
    image: ubuntu:24.04
    container_name: gangzi-task
    hostname: gangzi-task

    # 直接运行脚本（不需要完整的OpenClaw环境）
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "gangzi-task started"
        while true; do
          sleep 60
        done

    # 挂载卷
    volumes:
      # 共享目录
      - ./shared:/shared:rw
      # 工作空间（刚子-任务专用）
      - ${WORKSPACE_PATH:-./workspace/gangzi-task}:/workspace:rw

    # 网络
    networks:
      - docker-claw-network

    # 重启策略
    restart: unless-stopped

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 刚子-监控 - 状态监控者
  gangzi-monitor:
    image: ubuntu:24.04
    container_name: gangzi-monitor
    hostname: gangzi-monitor

    # 直接运行脚本
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "gangzi-monitor started"
        while true; do
          sleep 60
        done

    # 挂载卷
    volumes:
      # 共享目录
      - ./shared:/shared:rw
      # 工作空间（刚子-监控专用）
      - ${WORKSPACE_PATH:-./workspace/gangzi-monitor}:/workspace:rw

    # 网络
    networks:
      - docker-claw-network

    # 重启策略
    restart: unless-stopped

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 煎饼 - 开发者
  jianbing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jianbing-claw-container
    hostname: jianbing

    # 使用 entrypoint 自动配置
    entrypoint: ["/scripts/entrypoint.sh"]
    command: ["openclaw", "gateway", "--port", "18789", "--allow-unconfigured"]

    # 环境变量
    environment:
      - HOME=/app
      - AGENT_NAME=jianbing
      - AGENT_ROLE=developer
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GIT_USER_NAME=${JIANBING_GIT_NAME:-Jianbing}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-jianbing@docker-claw.local}
      - MINIMAX_API_KEY=${JIANBING_API_KEY}
      - OPENCLAW_MODEL=${JIANBING_MODEL:-minimax/MiniMax-M2.5}

    # 挂载卷
    volumes:
      # 启动脚本
      - ./scripts/entrypoint.sh:/scripts/entrypoint.sh:ro

      # 共享目录
      - ./shared:/shared:rw
      
      # Git仓库（工作空间）
      - ${WORKSPACE_PATH:-./workspace/jianbing}:/workspace:rw

      # 煎饼的配置文件
      - ./config/jianbing:/app/.openclaw/workspace:rw
      
      # Git配置（只读）
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      - ${HOME}/.ssh:/root/.ssh:ro
      
      # OpenClaw数据（持久化）
      - jianbing-openclaw-data:/root/.openclaw
    
    # 工作目录
    working_dir: /workspace
    
    # 网络
    networks:
      - docker-claw-network
    
    # 重启策略
    restart: unless-stopped
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # 依赖（如果有）
    # depends_on:
    #   - some-service

  # 墨汁儿 - 审查者
  mozhi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mozhi-claw-container
    hostname: mozhi

    # 使用 entrypoint 自动配置
    entrypoint: ["/scripts/entrypoint.sh"]
    command: ["openclaw", "gateway", "--port", "18789", "--allow-unconfigured"]

    # 环境变量
    environment:
      - HOME=/app
      - AGENT_NAME=mozhi
      - AGENT_ROLE=reviewer
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GIT_USER_NAME=${MOZHI_GIT_NAME:-Mozhi}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-mozhi@docker-claw.local}
      - ZHIPU_API_KEY=${MOZHI_API_KEY}
      - OPENCLAW_MODEL=${MOZHI_MODEL:-zhipu/glm-5}

    # 挂载卷
    volumes:
      # 启动脚本
      - ./scripts/entrypoint.sh:/scripts/entrypoint.sh:ro

      # 共享目录
      - ./shared:/shared:rw

      # Git仓库（工作空间）
      - ${WORKSPACE_PATH:-./workspace/mozhi}:/workspace:rw

      # 墨汁儿的配置文件
      - ./config/mozhi:/app/.openclaw/workspace:rw
      
      # Git配置（只读）
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      - ${HOME}/.ssh:/root/.ssh:ro
      
      # OpenClaw数据（持久化）
      - mozhi-openclaw-data:/root/.openclaw
    
    # 工作目录
    working_dir: /workspace
    
    # 网络
    networks:
      - docker-claw-network
    
    # 重启策略
    restart: unless-stopped
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# 网络定义
networks:
  docker-claw-network:
    driver: bridge
    name: docker-claw-network

# 数据卷定义
volumes:
  jianbing-openclaw-data:
    name: jianbing-openclaw-data
  mozhi-openclaw-data:
    name: mozhi-openclaw-data
